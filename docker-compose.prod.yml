version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SKIP_INSTALL: ${SKIP_INSTALL:-false}
    container_name: splitbuddy_backend_prod
    ports:
      - '5900:5900'
    env_file:
      - .env.prod
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5900/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: splitbuddy_postgres_prod
    environment:
      - POSTGRES_DB=${DB_DATABASE:-splitbuddy_prod}
      - POSTGRES_USER=${DB_USERNAME:-splitbuddy_user_prod}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-SplitBuddy2024!Secure}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./setup_db.sql:/docker-entrypoint-initdb.d/setup_db.sql
    ports:
      - '5433:5432' # Changed from 5432:5432 to avoid conflict
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-splitbuddy_user_prod} -d ${DB_DATABASE:-splitbuddy_prod}"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: splitbuddy_redis_prod
    ports:
      - '6379:6379'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data_prod:
