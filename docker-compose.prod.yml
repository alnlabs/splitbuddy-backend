version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SKIP_INSTALL: ${SKIP_INSTALL:-false}
    container_name: splitbuddy_backend_prod
    ports:
      - '5900:5900'
    # Environment variables will be injected by Doppler
    # No env_file needed - Doppler handles all environment variables
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5900/api/v1/db-test']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: splitbuddy_postgres_prod
    # Environment variables will be injected by Doppler
    # No env_file needed - Doppler handles all environment variables
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./setup_db.sql:/docker-entrypoint-initdb.d/setup_db.sql
    ports:
      - '5434:5432' # Changed from 5433:5432 to avoid conflict
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U splitbuddy_user_prod -d splitbuddy_prod']
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: splitbuddy_redis_prod
    # Environment variables will be injected by Doppler
    # No env_file needed - Doppler handles all environment variables
    ports:
      - '6379:6379'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data_prod:
